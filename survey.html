<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>전입학 가능 여부 진단 — 충청남도교육청</title>
  <meta name="description" content="충청남도 고등학교 전입학 가능 여부를 7문항으로 간단히 진단해 드립니다." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>

  <!-- ===== HEADER ===== -->
  <header class="site-header" role="banner">
    <div class="header-inner">
      <a href="index.html" class="header-brand" aria-label="충청남도교육청 홈으로">
        <div class="header-logo-circle" aria-hidden="true">충남</div>
        <span class="header-brand-name">충청남도교육청</span>
      </a>
      <a href="index.html" class="back-link" aria-label="전입학 안내 메인으로 돌아가기">
        ← 전입학 안내
      </a>
    </div>
  </header>

  <!-- ===== PAGE TITLE BANNER ===== -->
  <div class="page-title-section" role="heading" aria-level="1">
    <h1>고등학교 전입학 가능 여부 진단</h1>
    <p>7가지 질문에 답하시면 전입학 가능 여부를 안내해 드립니다.</p>
  </div>

  <!-- ===== MAIN ===== -->
  <main role="main" id="main-content">
    <div class="survey-wrapper">

      <!-- 진행률 표시 -->
      <div
        class="progress-section"
        id="progress-section"
        role="progressbar"
        aria-label="설문 진행률"
        aria-valuemin="0"
        aria-valuemax="100"
        aria-valuenow="0"
      >
        <div class="progress-header">
          <span class="progress-step-label" id="step-num" aria-live="polite">1 / 7</span>
          <span class="progress-pct" id="progress-text">0%</span>
        </div>
        <div class="progress-bar-track">
          <div class="progress-bar-fill" id="progress-bar"></div>
        </div>
      </div>

      <!-- ===== 설문 컨테이너 ===== -->
      <div id="survey-container">

        <!-- 질문 카드 -->
        <div class="question-card" role="form" aria-label="전입학 가능 여부 진단 설문">
          <div class="question-step-badge" aria-hidden="true">질문 <span id="step-num-badge">1</span> / 7</div>
          <h2 class="question-text" id="question-text"></h2>
          <p class="question-hint" id="question-hint"></p>
          <div
            class="options-grid"
            id="options-container"
            role="radiogroup"
            aria-labelledby="question-text"
          ></div>
        </div>

        <!-- 이전 / 다음 버튼 -->
        <div class="nav-card" role="navigation" aria-label="설문 이동">
          <button
            class="btn-nav btn-prev"
            id="prev-btn"
            type="button"
            onclick="goPrev()"
            aria-label="이전 질문으로"
          >
            ← 이전
          </button>
          <button
            class="btn-nav btn-next"
            id="next-btn"
            type="button"
            onclick="goNext()"
            aria-label="다음 질문으로"
            disabled
          >
            다음  →
          </button>
        </div>

      </div><!-- /#survey-container -->

      <!-- ===== 결과 영역 (초기에는 숨김) ===== -->
      <div id="result-area" hidden aria-live="polite">
        <div class="result-card" role="region" aria-label="진단 결과">

          <!-- 아이콘 -->
          <div class="result-icon" id="result-icon" aria-hidden="true"></div>

          <!-- 배지 -->
          <div class="result-badge" id="result-badge" role="status"></div>

          <!-- 제목 -->
          <h2 class="result-title" id="result-title"></h2>

          <!-- 상세 설명 -->
          <div class="result-detail-box">
            <div class="result-detail" id="result-detail"></div>
          </div>

          <!-- 진단 코드 -->
          <p class="result-code" id="result-code"></p>

          <!-- 다시하기 -->
          <button
            class="btn-reset"
            type="button"
            onclick="resetSurvey()"
            aria-label="처음부터 다시하기"
          >
            ↺ 처음부터 다시하기
          </button>

        </div>
      </div><!-- /#result-area -->

      <!-- 문의처 안내 -->
      <div class="contact-bar" role="complementary" aria-label="문의처 안내">
        자세한 문의: <strong>충청남도교육청 중등교육과</strong> ☎ 041-640-XXXX
      </div>

    </div><!-- /.survey-wrapper -->
  </main>

  <!-- ===== FOOTER ===== -->
  <footer class="site-footer" role="contentinfo">
    <p>© 충청남도교육청. All rights reserved.</p>
  </footer>

  <script src="js/survey.js"></script>
</body>
</html>
